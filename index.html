<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Geradores - USP CeTI-RP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f4f4f4; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; }

.usp-banner {
    background-color: #f7b22a;
    display: flex;
    align-items: center;
    padding: 15px 30px;
    border-radius: 10px 10px 0 0;
    border-bottom: 5px solid #005596;
}

.usp-logo-box {
    background: white; padding: 10px; margin-right: 20px;
    display: flex; align-items: center; justify-content: center; border-radius: 5px;
}

.usp-logo-box img { height: 60px; }

.card { max-width: 950px; margin: auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

.section-box {
    background: #fff; padding: 20px; border-radius: 8px;
    margin-bottom: 20px; border-left: 5px solid #f7b22a;
}

.section-title {
    font-weight: bold; color: #005596; font-size: 0.8rem;
    margin-bottom: 15px; display: block;
}

.fuel-critical { border: 2px solid #dc3545 !important; background-color: #fff8f8 !important; }

#fuel-msg {
    color: #dc3545; font-weight: bold; font-size: 0.75rem;
    display: none; margin-top: 5px;
}

.btn-submit {
    background: #005596; color: white; padding: 15px;
    font-weight: bold; border-radius: 5px; width: 100%;
}

#successMsg {
    display: none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="usp-banner">
<div class="usp-logo-box">
<img src="logo.png">
</div>
<div>
<strong>Centro de Tecnologia da Informação de Ribeirão Preto</strong><br>
<strong>Universidade de São Paulo</strong><br>
Vistoria Preventiva de Geradores
</div>
</div>

<div class="card-body">

<form action="https://docs.google.com/forms/d/e/1FAIpQLSf54rns4b7b1SZh-QkAcG-EbOTnCpAPKp67luOFgCqZLn_uqQ/formResponse"
method="POST" target="hidden_iframe" onsubmit="return handleFormSubmit(this);">

<!-- IDENTIFICAÇÃO -->
<div class="section-box">
<span class="section-title">1. Identificação</span>

<div class="row">
<div class="col-md-3">
<label>Data</label>
<input type="date" name="entry.354204257" class="form-control" required>
</div>

<div class="col-md-3">
<label>Responsável</label>
<input type="text" name="entry.56529241" class="form-control" required>
</div>

<div class="col-md-3">
<label>Local</label>
<select name="entry.1027575289" class="form-select">
<option value="CeTIRP">CeTIRP</option>
<option value="Casa 23 - Telefonia">Casa 23 - Telefonia</option>
</select>
</div>

<div class="col-md-3">
<label>Gerador</label>
<select name="entry.590039013" class="form-select">
<option value="Cummins">Cummins</option>
<option value="Stemac">Stemac</option>
</select>
</div>
</div>
</div>

<!-- FLUIDOS -->
<div class="section-box">
<span class="section-title">2. Fluidos</span>

<div class="row">
<div class="col-md-3">
<label>Óleo</label>
<select name="entry.2084732658" class="form-select">
<option value="OK">OK</option>
<option value="NÃO OK">NÃO OK</option>
</select>
</div>

<div class="col-md-3">
<label>Arrefecimento</label>
<select name="entry.277221535" class="form-select">
<option value="OK">OK</option>
<option value="NÃO OK">NÃO OK</option>
</select>
</div>

<div class="col-md-3">
<label>Vazamentos</label>
<select name="entry.294271165" class="form-select">
<option value="Não">Não</option>
<option value="Sim">Sim</option>
</select>
</div>

<div class="col-md-3">
<label>Combustível</label>
<input type="number" id="fuelInput" name="entry.2116426682" class="form-control" required>
<div id="fuel-msg">⚠️ ABAIXO DE 70L</div>
</div>
</div>
</div>

<!-- ELÉTRICA -->
<div class="section-box">
<span class="section-title">3. Elétrica</span>

<div class="row">
<div class="col-md-4">
<label>Bateria</label>
<input type="text" name="entry.818904757" class="form-control">
</div>

<div class="col-md-4">
<label>Horímetro</label>
<input type="number" step="0.1" name="entry.848669693" class="form-control" required>
</div>

<div class="col-md-4">
<label>Correias</label>
<select name="entry.809569571" class="form-select">
<option value="OK">OK</option>
<option value="NÃO OK">NÃO OK</option>
</select>
</div>
</div>
</div>

<!-- SEGURANÇA -->
<div class="section-box">
<span class="section-title">4. Segurança</span>

<div class="row">
<div class="col-md-4">
<label>Extintor</label>
<select name="entry.2132958707" class="form-select">
<option value="OK">OK</option>
<option value="NÃO OK">NÃO OK</option>
</select>
</div>

<div class="col-md-4">
<label>Limpeza</label>
<select name="entry.1765001064" class="form-select">
<option value="Limpa e Organizada">Limpa e Organizada</option>
<option value="Suja">Suja</option>
</select>
</div>

<div class="col-md-4">
<label>Câmeras</label>
<select name="entry.825633635" class="form-select">
<option value="Funcionando">Funcionando</option>
<option value="Offine">Offline</option> <!-- CORREÇÃO -->
</select>
</div>
</div>
</div>

<div class="mb-3">
<label>Observações</label>
<textarea name="entry.723380094" class="form-control"></textarea>
</div>

<button type="submit" class="btn-submit" id="btnEnvio">
ENVIAR CHECKLIST
</button>

<div id="successMsg" class="alert alert-success mt-3">
✔ Checklist enviado com sucesso!
</div>

</form>
</div>
</div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
function handleFormSubmit(form) {
    document.getElementById('btnEnvio').disabled = true;
    document.getElementById('btnEnvio').innerText = "Enviando...";

    setTimeout(function () {
        document.getElementById('successMsg').style.display = 'block';
        form.reset();

        document.getElementById('btnEnvio').disabled = false;
        document.getElementById('btnEnvio').innerText = "ENVIAR CHECKLIST";
    }, 2000);

    return true;
}

const fuelInput = document.getElementById('fuelInput');
fuelInput.addEventListener('input', function() {
    const valor = parseFloat(this.value);
    const msg = document.getElementById('fuel-msg');

    if (valor > 0 && valor < 70) {
        this.classList.add('fuel-critical');
        msg.style.display = 'block';
    } else {
        this.classList.remove('fuel-critical');
        msg.style.display = 'none';
    }
});
</script>

</body>
</html>
